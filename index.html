<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deme - Job Tracking</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f8fafc; min-height: 100vh; }

    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #1e3a5f;
    }
    .login-box {
      background: #fff; border-radius: 12px; padding: 40px;
      width: 340px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-box h1 { font-size: 22px; color: #1e3a5f; margin-bottom: 4px; }
    .login-box p { font-size: 12px; color: #94a3b8; margin-bottom: 24px; }
    .login-box input {
      width: 100%; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: 10px 14px; font-size: 14px; margin-bottom: 12px;
    }
    .login-box button {
      width: 100%; background: #1e3a5f; color: #fff; border: none;
      border-radius: 6px; padding: 11px; font-size: 14px; font-weight: bold; cursor: pointer;
    }
    .login-error { color: #ef4444; font-size: 12px; margin-top: 8px; }

    #app { display: none; max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
    .eyebrow { font-size: 10px; font-weight: bold; color: #94a3b8; letter-spacing: 0.1em; margin-bottom: 2px; }
    .page-title { font-size: 22px; font-weight: bold; color: #1e293b; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-primary { background: #1e3a5f; color: #fff; border: none; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-green { background: #059669; color: #fff; border: none; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-ghost { background: transparent; color: #475569; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
    .btn-small { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; border-radius: 5px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
    .btn-danger { background: #fff5f5; color: #ef4444; border: 1px solid #fecaca; border-radius: 5px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
    .btn-disabled { background: transparent; color: #cbd5e1; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 14px; font-size: 13px; cursor: not-allowed; }

    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
    .card-label { font-size: 10px; font-weight: bold; color: #94a3b8; letter-spacing: 0.1em; margin-bottom: 14px; }
    .field-label { font-size: 9px; font-weight: bold; color: #94a3b8; letter-spacing: 0.1em; margin-bottom: 5px; }

    .meeting-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .meeting-date { font-size: 15px; font-weight: bold; color: #1e293b; }
    .meeting-meta { font-size: 12px; color: #64748b; margin-top: 2px; }
    .badge-synced { font-size: 10px; background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 999px; font-weight: bold; }
    .badge-unsynced { font-size: 10px; background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 999px; font-weight: bold; }

    input[type=date], select, input[type=text], textarea {
      border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 10px;
      font-size: 13px; color: #1e293b; background: #fff; width: 100%; font-family: Arial, sans-serif;
    }
    textarea { resize: vertical; min-height: 56px; }

    .progress-bar { flex: 1; height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: #10b981; border-radius: 999px; transition: width 0.3s; }

    .meeting-layout { display: flex; gap: 16px; align-items: flex-start; }
    .sidebar { width: 210px; flex-shrink: 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; max-height: 80vh; overflow-y: auto; }
    .sidebar-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
    .sidebar-item:hover { background: #f8fafc; }
    .sidebar-item.active { background: #eff6ff; border-left: 3px solid #1e3a5f; }
    .sidebar-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sidebar-name { font-size: 10px; font-weight: bold; color: #334155; letter-spacing: 0.02em; line-height: 1.3; margin-left: 6px; }
    .sidebar-check { color: #10b981; font-size: 11px; font-weight: bold; }

    .detail-panel { flex: 1; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; }
    .job-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .job-title { font-size: 14px; font-weight: bold; color: #1e293b; letter-spacing: 0.03em; }

    .sec-block { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
    .sec-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; cursor: pointer; background: #f8fafc; user-select: none; }
    .sec-name { font-size: 11px; font-weight: bold; color: #334155; letter-spacing: 0.05em; }
    .sec-body { padding: 12px 14px; border-top: 1px solid #e2e8f0; display: none; }
    .sec-body.open { display: block; }
    .field-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .field-group { flex: 1; min-width: 130px; margin-bottom: 10px; }

    .status-badge { font-size: 10px; font-weight: bold; padding: 2px 7px; border-radius: 999px; margin-left: 6px; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f1f5f9; }

    .sync-msg { padding: 10px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; font-weight: bold; }
    .sync-ok { background: #d1fae5; color: #065f46; }
    .sync-warn { background: #fef9c3; color: #854d0e; }
    .sync-err { background: #fee2e2; color: #991b1b; }

    .empty { color: #94a3b8; font-size: 14px; text-align: center; padding: 40px; }

    @media (max-width: 640px) {
      .meeting-layout { flex-direction: column; }
      .sidebar { width: 100%; max-height: 200px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Deme - Job Tracking</h1>
    <p>Weekly Material Release Tracker</p>
    <input type="password" id="pw-input" placeholder="Enter password" />
    <button onclick="tryLogin()">Enter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app"></div>

<script>
const PASSWORD = "Demestaline1";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwni5HlOy08Tq5dJqbDZRrDK8hmak3cf1JEZwZhfSLlh3quUSylc4PDfI-HzEcBfUst/exec";

const JOBS = [
  "CHALETS AT LAKEWOOD RANCH","COCOPLUM VILLAGE EXPANSION","FIT BUILDINGS 22 AND 23",
  "FIRELIGHT PHASE 2A","FIRELIGHT PHASE 2C","LEO SAN MARCO","LWR CORP PARK 2",
  "LWR PARCEL J","RESERVE SENIOR LIVING","SCF PARRISH 1","SRQ MALL PHASE 1",
  "SRQ MALL PHASE 1A","SRQ MALL PHASE 1B","VILLAGES OF GLEN CREEK PHASE 1C",
  "VILLAGES OF GLEN CREEK PHASE 2B","WILLOW PHASE 3"
];

const SECTIONS = ["STORM DRAINAGE","FORCE MAIN","SANITARY SEWER","POTABLE WATER","FIRE","RECLAIM"];
const STATUS_OPTIONS = ["","RELEASED","PENDING RELEASE","NEEDS ORDERING","ON HOLD","COMPLETE"];
const STATUS_STYLES = {
  "RELEASED":        {bg:"#d1fae5",color:"#065f46",dot:"#10b981"},
  "PENDING RELEASE": {bg:"#fef9c3",color:"#854d0e",dot:"#eab308"},
  "NEEDS ORDERING":  {bg:"#fee2e2",color:"#991b1b",dot:"#ef4444"},
  "ON HOLD":         {bg:"#f1f5f9",color:"#475569",dot:"#94a3b8"},
  "COMPLETE":        {bg:"#ede9fe",color:"#4c1d95",dot:"#8b5cf6"},
};

const LOCAL_KEY = "deme_v1";
let meetings = [];
let currentView = "home";
let activeMeetingId = null;
let activeJobIdx = 0;
let expandedSections = {};
let syncing = false;

function load() {
  try { meetings = JSON.parse(localStorage.getItem(LOCAL_KEY) || "[]"); } catch { meetings = []; }
}
function save() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(meetings));
}

function today() { return new Date().toISOString().split("T")[0]; }
function fmtDate(iso) {
  if (!iso) return "";
  const [y,m,d] = iso.split("-"); return `${m}/${d}/${y}`;
}
function fmtDisplay(iso) {
  if (!iso) return "";
  return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
}

function newMeeting(date) {
  return {
    id: Date.now(), date, synced: false,
    jobs: JOBS.map(j => ({
      name: j, discussed: false, generalNotes: "",
      sections: SECTIONS.map(s => ({name:s,status:"",releaseDate:"",shipDate:"",notes:""}))
    }))
  };
}

function activeMeeting() { return meetings.find(m => m.id === activeMeetingId); }
function activeJob() { const m = activeMeeting(); return m ? m.jobs[activeJobIdx] : null; }

// LOGIN
function tryLogin() {
  const val = document.getElementById("pw-input").value;
  if (val === PASSWORD) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    load(); render();
  } else {
    document.getElementById("login-error").textContent = "Incorrect password. Try again.";
  }
}
document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

// RENDER
function render() {
  if (currentView === "home") renderHome();
  else if (currentView === "meeting") renderMeeting();
}

function renderHome() {
  const app = document.getElementById("app");
  const recent = meetings.slice(0,10).map(m => {
    const discussed = m.jobs.filter(j=>j.discussed).length;
    return `<div class="meeting-row">
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="meeting-date">${fmtDisplay(m.date)}</div>
          <span class="${m.synced?'badge-synced':'badge-unsynced'}">${m.synced?'✅ Synced':'⏳ Not synced'}</span>
        </div>
        <div class="meeting-meta">${discussed} job${discussed!==1?'s':''} discussed</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-small" onclick="openMeeting(${m.id})">Open</button>
        <button class="btn-danger" onclick="deleteMeeting(${m.id})">Delete</button>
      </div>
    </div>`;
  }).join("");

  app.innerHTML = `
    <div class="header">
      <div>
        <div class="eyebrow">DEME — JOB TRACKING</div>
        <div class="page-title">Weekly Meeting Log</div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">START NEW MEETING</div>
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div>
          <div class="field-label">MEETING DATE</div>
          <input type="date" id="new-date" value="${today()}" style="width:auto" />
        </div>
        <button class="btn-primary" onclick="startNewMeeting()">+ New Meeting</button>
      </div>
    </div>
    ${meetings.length > 0 ? `<div class="card"><div class="card-label">RECENT MEETINGS</div>${recent}</div>` : `<div class="empty">No meetings yet — start one above!</div>`}
  `;
}

function startNewMeeting() {
  const date = document.getElementById("new-date").value || today();
  const m = newMeeting(date);
  meetings.unshift(m);
  save();
  activeMeetingId = m.id;
  activeJobIdx = 0;
  expandedSections = {};
  currentView = "meeting";
  render();
}

function openMeeting(id) {
  activeMeetingId = id;
  activeJobIdx = 0;
  expandedSections = {};
  currentView = "meeting";
  render();
}

function deleteMeeting(id) {
  if (!confirm("Delete this meeting?")) return;
  meetings = meetings.filter(m => m.id !== id);
  save(); render();
}

function renderMeeting() {
  const m = activeMeeting();
  if (!m) { currentView = "home"; renderHome(); return; }
  const job = m.jobs[activeJobIdx];
  const discussed = m.jobs.filter(j=>j.discussed).length;
  const pct = Math.round((discussed/JOBS.length)*100);

  const sidebarItems = m.jobs.map((j,idx) => `
    <div class="sidebar-item${idx===activeJobIdx?' active':''}" onclick="selectJob(${idx})">
      <div style="display:flex;align-items:center">
        <div class="sidebar-dot" style="background:${j.discussed?'#10b981':'#d1d5db'}"></div>
        <span class="sidebar-name">${j.name}</span>
      </div>
      ${j.discussed?'<span class="sidebar-check">✓</span>':''}
    </div>`).join("");

  const secBlocks = job.sections.map((sec,si) => {
    const key = `${activeJobIdx}-${si}`;
    const isOpen = expandedSections[key];
    const st = STATUS_STYLES[sec.status] || {};
    const hasDot = sec.status||sec.releaseDate||sec.shipDate||sec.notes;
    const dotColor = hasDot ? (st.dot||'#3b82f6') : '#e2e8f0';
    const badge = sec.status ? `<span class="status-badge" style="background:${st.bg};color:${st.color}">${sec.status}</span>` : '';
    const dateHint = sec.releaseDate ? `<span style="font-size:10px;color:#64748b;margin-left:6px">📅 ${fmtDate(sec.releaseDate)}</span>` : '';
    const opts = STATUS_OPTIONS.map(o=>`<option value="${o}"${sec.status===o?'selected':''}>${o||'— Select —'}</option>`).join("");

    return `<div class="sec-block">
      <div class="sec-header" onclick="toggleSec('${key}')">
        <div style="display:flex;align-items:center">
          <div class="sidebar-dot" style="background:${dotColor}"></div>
          <span class="sec-name" style="margin-left:8px">${sec.name}</span>
          ${badge}${dateHint}
        </div>
        <span style="color:#94a3b8;font-size:11px">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="sec-body${isOpen?' open':''}">
        <div class="field-row">
          <div class="field-group">
            <div class="field-label">STATUS</div>
            <select onchange="updateSec(${activeJobIdx},${si},'status',this.value)">${opts}</select>
          </div>
          <div class="field-group">
            <div class="field-label">RELEASE DATE</div>
            <input type="date" value="${sec.releaseDate}" onchange="updateSec(${activeJobIdx},${si},'releaseDate',this.value)" />
          </div>
          <div class="field-group">
            <div class="field-label">SHIP DATE</div>
            <input type="date" value="${sec.shipDate}" onchange="updateSec(${activeJobIdx},${si},'shipDate',this.value)" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">NOTES / PO # / SUPPLIER</div>
          <input type="text" value="${sec.notes}" placeholder="e.g. PO#1234, supplier, quantities..." onchange="updateSec(${activeJobIdx},${si},'notes',this.value)" />
        </div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div>
        <div class="eyebrow">MEETING WITH CHRIS</div>
        <div class="page-title">${fmtDisplay(m.date)}</div>
      </div>
      <div class="btn-row">
        <button class="btn-green" onclick="syncToSheets()" ${syncing?'disabled':''}>
          ${syncing?'Syncing...':'☁️ Sync to Google Sheets'}
        </button>
        <button class="btn-ghost" onclick="goHome()">← Home</button>
      </div>
    </div>
    <div id="sync-msg"></div>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:#64748b;white-space:nowrap">${discussed}/${JOBS.length} jobs</div>
    </div>
    <div class="meeting-layout">
      <div class="sidebar">${sidebarItems}</div>
      <div class="detail-panel">
        <div class="job-header">
          <div class="job-title">${job.name}</div>
          <label style="display:flex;align-items:center;font-size:13px;color:#475569;cursor:pointer">
            <input type="checkbox" ${job.discussed?'checked':''} onchange="updateJobField(${activeJobIdx},'discussed',this.checked)" style="margin-right:6px;width:auto" />
            Discussed this meeting
          </label>
        </div>
        <div style="margin-bottom:14px">
          <div class="field-label">GENERAL NOTES / OVERVIEW</div>
          <textarea placeholder="Overall job status, timeline updates, anything from Chris..." onchange="updateJobField(${activeJobIdx},'generalNotes',this.value)">${job.generalNotes}</textarea>
        </div>
        ${secBlocks}
        <div class="nav-row">
          <button class="${activeJobIdx>0?'btn-ghost':'btn-disabled'}" onclick="prevJob()" ${activeJobIdx===0?'disabled':''}>← Prev</button>
          <span style="font-size:12px;color:#94a3b8">${activeJobIdx+1} of ${JOBS.length}</span>
          <button class="${activeJobIdx<JOBS.length-1?'btn-primary':'btn-disabled'}" onclick="nextJob()" ${activeJobIdx===JOBS.length-1?'disabled':''}>Next →</button>
        </div>
      </div>
    </div>
  `;
}

function goHome() { currentView = "home"; render(); }
function selectJob(idx) { activeJobIdx = idx; render(); }
function prevJob() { if (activeJobIdx > 0) { activeJobIdx--; render(); } }
function nextJob() { if (activeJobIdx < JOBS.length-1) { activeJobIdx++; render(); } }

function toggleSec(key) {
  expandedSections[key] = !expandedSections[key];
  render();
}

function updateSec(jobIdx, secIdx, field, value) {
  const m = activeMeeting();
  if (!m) return;
  m.jobs[jobIdx].sections[secIdx][field] = value;
  m.synced = false;
  save(); render();
}

function updateJobField(jobIdx, field, value) {
  const m = activeMeeting();
  if (!m) return;
  m.jobs[jobIdx][field] = value;
  m.synced = false;
  save(); render();
}

function showSyncMsg(text, type) {
  const el = document.getElementById("sync-msg");
  if (!el) return;
  el.className = "sync-msg " + type;
  el.textContent = text;
  el.style.display = "block";
}

async function syncToSheets() {
  const m = activeMeeting();
  if (!m) return;
  syncing = true; render();
  try {
    const rows = [];
    const loggedAt = new Date().toLocaleString();
    m.jobs.filter(j=>j.discussed).forEach(job => {
      job.sections.forEach(sec => {
        if (sec.status||sec.releaseDate||sec.shipDate||sec.notes||job.generalNotes) {
          rows.push([fmtDisplay(m.date),job.name,sec.name,sec.status||"",fmtDate(sec.releaseDate),fmtDate(sec.shipDate),sec.notes||job.generalNotes||"",loggedAt]);
        }
      });
    });
    if (rows.length === 0) {
      syncing = false; render();
      showSyncMsg("⚠️ No discussed jobs with data to sync.", "sync-warn");
      return;
    }
    const res = await fetch(SCRIPT_URL, { method:"POST", body: JSON.stringify({rows}) });
    const data = await res.json();
    if (data.success) {
      m.synced = true; save(); syncing = false; render();
      showSyncMsg(`✅ Synced ${rows.length} rows to Google Sheets!`, "sync-ok");
    } else {
      syncing = false; render();
      showSyncMsg("❌ Sync failed. Try again.", "sync-err");
    }
  } catch {
    syncing = false; render();
    showSyncMsg("❌ Connection error. Check internet and try again.", "sync-err");
  }
}
</script>
</body>
</html>
