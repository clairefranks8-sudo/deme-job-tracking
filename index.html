<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Deme - Job Tracking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f8fafc;min-height:100vh}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1e3a5f}
.login-box{background:#fff;border-radius:12px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:22px;color:#1e3a5f;margin-bottom:4px}
.login-box p{font-size:12px;color:#94a3b8;margin-bottom:24px}
.login-role{display:flex;gap:10px;margin-bottom:16px}
.role-btn{flex:1;padding:12px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;color:#475569;background:#fff;transition:all .15s}
.role-btn:hover{border-color:#1e3a5f;color:#1e3a5f}
.role-btn.active{border-color:#1e3a5f;background:#eff6ff;color:#1e3a5f}
.login-box input{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;font-size:14px;margin-bottom:12px}
.login-box button{width:100%;background:#1e3a5f;color:#fff;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:bold;cursor:pointer}
.login-error{color:#ef4444;font-size:12px;margin-top:8px}

#app{display:none;max-width:1100px;margin:0 auto;padding:20px 16px}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.eyebrow{font-size:10px;font-weight:bold;color:#94a3b8;letter-spacing:.1em;margin-bottom:2px}
.page-title{font-size:22px;font-weight:bold;color:#1e293b}
.role-tag{display:inline-block;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:999px;margin-left:8px;vertical-align:middle}
.role-tag-claire{background:#dbeafe;color:#1e40af}
.role-tag-alex{background:#dcfce7;color:#166534}

.btn-primary{background:#1e3a5f;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-green{background:#059669;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-ghost{background:transparent;color:#475569;border:1px solid #cbd5e1;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer}
.btn-small{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer}
.btn-danger{background:#fff5f5;color:#ef4444;border:1px solid #fecaca;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer}
.btn-disabled{background:transparent;color:#cbd5e1;border:1px solid #e2e8f0;border-radius:6px;padding:8px 14px;font-size:13px;cursor:not-allowed}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px 20px;margin-bottom:16px}
.card-label{font-size:10px;font-weight:bold;color:#94a3b8;letter-spacing:.1em;margin-bottom:14px}
.field-label{font-size:9px;font-weight:bold;color:#94a3b8;letter-spacing:.1em;margin-bottom:5px}

input[type=date],select,input[type=text],textarea{border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:13px;color:#1e293b;background:#fff;width:100%;font-family:Arial,sans-serif}
textarea{resize:vertical;min-height:70px}

.progress-wrap{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.progress-bar{flex:1;height:6px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:#10b981;border-radius:999px;transition:width .3s}

.layout{display:flex;gap:16px;align-items:flex-start}
.sidebar{width:210px;flex-shrink:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;max-height:82vh;overflow-y:auto}
.si{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9}
.si:hover{background:#f8fafc}
.si.active{background:#eff6ff;border-left:3px solid #1e3a5f}
.si-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.si-name{font-size:10px;font-weight:bold;color:#334155;letter-spacing:.02em;line-height:1.3;margin-left:6px}

.detail{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;max-height:82vh;overflow-y:auto}
.job-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.job-title{font-size:14px;font-weight:bold;color:#1e293b;letter-spacing:.03em}

.action-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px 16px;margin-bottom:14px}
.action-box-label{font-size:10px;font-weight:bold;color:#92400e;letter-spacing:.08em;margin-bottom:6px}
.action-box textarea{background:#fff;border-color:#fde68a;min-height:60px;font-size:13px}

.sec-block{border:1px solid #e2e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;user-select:none}
.sec-name{font-size:11px;font-weight:bold;letter-spacing:.05em}
.sec-body{display:none;border-top:1px solid #e2e8f0}
.sec-body.open{display:block}

/* Claire item rows */
.item-row{display:grid;grid-template-columns:140px 160px 1fr 1fr 1fr;gap:8px;align-items:start;padding:10px 14px;border-bottom:1px solid #f1f5f9}
.item-row:last-child{border-bottom:none}
.item-row:nth-child(even){background:#fafafa}
.item-name{font-size:11px;font-weight:bold;color:#334155;padding-top:6px}

/* Alex item rows */
.alex-item-row{display:grid;grid-template-columns:130px 120px 110px 100px 130px 90px 1fr;gap:8px;align-items:start;padding:10px 14px;border-bottom:1px solid #f1f5f9}
.alex-item-row:last-child{border-bottom:none}
.alex-item-row:nth-child(even){background:#fafafa}

.sec-summary{display:flex;gap:6px;flex-wrap:wrap;margin-left:8px}
.sum-badge{font-size:9px;font-weight:bold;padding:2px 6px;border-radius:999px}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9}

.alert{padding:10px 16px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:bold}
.alert-ok{background:#d1fae5;color:#065f46}
.alert-warn{background:#fef9c3;color:#854d0e}
.alert-err{background:#fee2e2;color:#991b1b}

.meeting-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.meeting-date{font-size:15px;font-weight:bold;color:#1e293b}
.meeting-meta{font-size:12px;color:#64748b;margin-top:2px}

.hist-entry{border:1px solid #e2e8f0;border-radius:8px;margin-bottom:12px;overflow:hidden}
.hist-hdr{background:#1e3a5f;color:#fff;padding:10px 14px;font-size:12px;font-weight:bold;display:flex;justify-content:space-between}
.hist-job{padding:8px 14px;border-bottom:1px solid #f1f5f9;font-size:12px}
.hist-job:last-child{border-bottom:none}
.hist-job-name{font-weight:bold;color:#1e293b;margin-bottom:4px;font-size:11px}
.hist-item{color:#475569;font-size:11px;padding:2px 0;padding-left:12px}

.delivered-badge{background:#d1fae5;color:#065f46;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:999px}
.pending-badge{background:#fef9c3;color:#854d0e;font-size:10px;font-weight:bold;padding:2px 8px;border-radius:999px}

.loading{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
.empty{color:#94a3b8;font-size:14px;text-align:center;padding:40px}
.saving-indicator{font-size:11px;color:#10b981;font-weight:bold}

/* Alex overview table */
.overview-table{width:100%;border-collapse:collapse;font-size:12px}
.overview-table th{background:#1e3a5f;color:#fff;padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.05em}
.overview-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#334155}
.overview-table tr:nth-child(even) td{background:#f8fafc}

@media(max-width:700px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:180px}
  .item-row{grid-template-columns:1fr 1fr;gap:6px}
  .item-name{grid-column:1/-1}
  .alex-item-row{grid-template-columns:1fr 1fr;gap:6px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Deme - Job Tracking</h1>
    <p>Material Release & Delivery Tracker</p>
    <div class="login-role">
      <button class="role-btn active" id="role-claire" onclick="setRole('claire')">👤 Claire<br><span style="font-size:10px;font-weight:normal">Sales / Meetings</span></button>
      <button class="role-btn" id="role-alex" onclick="setRole('alex')">👤 Alex<br><span style="font-size:10px;font-weight:normal">Material Tracking</span></button>
    </div>
    <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button onclick="tryLogin()">Enter</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<div id="app"></div>

<script>
const SUPABASE_URL = "https://alwatlxwwznoaegvqvrw.supabase.co";
const SUPABASE_KEY = "sb_publishable_u-mdVIHGtEEeNGcATqcWYw_A5aOyK3J";
const PW_CLAIRE = "Demestaline1";
const PW_ALEX = "Demestaline1";

const JOBS = [
  "CHALETS AT LAKEWOOD RANCH","COCOPLUM VILLAGE EXPANSION","FIT BUILDINGS 22 AND 23",
  "FIRELIGHT PHASE 2A","FIRELIGHT PHASE 2C","LEO SAN MARCO","LWR CORP PARK 2",
  "LWR PARCEL J","RESERVE SENIOR LIVING","SCF PARRISH 1","SRQ MALL PHASE 1",
  "SRQ MALL PHASE 1A","SRQ MALL PHASE 1B","VILLAGES OF GLEN CREEK PHASE 1C",
  "VILLAGES OF GLEN CREEK PHASE 2B","WILLOW PHASE 3"
];
const SECTIONS = {
  "STORM DRAINAGE":["PIPE","FITTINGS","YARD DRAINS","UNDER DRAIN"],
  "FORCE MAIN":    ["PVC","PRESSURE MATERIAL","SERVICE","BRASS","PUNCH OUT MATERIAL"],
  "SANITARY SEWER":["PVC","PRESSURE MATERIAL","SERVICE","BRASS","PUNCH OUT MATERIAL"],
  "POTABLE WATER": ["PVC","PRESSURE MATERIAL","SERVICE","BRASS","PUNCH OUT MATERIAL"],
  "FIRE":          ["PVC","PRESSURE MATERIAL","SERVICE","BRASS","PUNCH OUT MATERIAL"],
  "RECLAIM":       ["PVC","PRESSURE MATERIAL","SERVICE","BRASS","PUNCH OUT MATERIAL"],
};
const SEC_COLORS = {
  "STORM DRAINAGE":{bg:"#e0f0fb",hdr:"#2980b9"},
  "FORCE MAIN":    {bg:"#e9f7ef",hdr:"#27ae60"},
  "SANITARY SEWER":{bg:"#fef9e7",hdr:"#d4ac0d"},
  "POTABLE WATER": {bg:"#eaf4fb",hdr:"#2e86c1"},
  "FIRE":          {bg:"#fdf2f2",hdr:"#c0392b"},
  "RECLAIM":       {bg:"#f5eef8",hdr:"#8e44ad"},
};
const STATUS_OPTS = ["","RELEASED","PENDING RELEASE","NEEDS ORDERING","ON HOLD","COMPLETE","N/A"];
const STATUS_ST = {
  "RELEASED":        {bg:"#d1fae5",color:"#065f46",dot:"#10b981"},
  "PENDING RELEASE": {bg:"#fef9c3",color:"#854d0e",dot:"#eab308"},
  "NEEDS ORDERING":  {bg:"#fee2e2",color:"#991b1b",dot:"#ef4444"},
  "ON HOLD":         {bg:"#f1f5f9",color:"#475569",dot:"#94a3b8"},
  "COMPLETE":        {bg:"#ede9fe",color:"#4c1d95",dot:"#8b5cf6"},
  "N/A":             {bg:"#f1f5f9",color:"#94a3b8",dot:"#cbd5e1"},
};

let currentRole = "claire";
let view = "home";
let activeJobIdx = 0;
let expandedSecs = {};
let discussed = {};
let jobStatuses = {};
let jobNotes = {};
let alexData = {};
let meetings = [];
let activeMtgId = null;
let saveTimeout = null;

// ── SUPABASE API ──────────────────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": opts.prefer || "return=representation",
      ...(opts.headers||{})
    }
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadAll() {
  try {
    const [statuses, notes, alex, mtgs] = await Promise.all([
      sbFetch("job_statuses?select=*"),
      sbFetch("job_notes?select=*"),
      sbFetch("alex_tracking?select=*"),
      sbFetch("meeting_log?select=*&order=meeting_date.desc"),
    ]);

    // Build jobStatuses
    JOBS.forEach(j => {
      jobStatuses[j] = {};
      Object.keys(SECTIONS).forEach(sec => {
        jobStatuses[j][sec] = {};
        SECTIONS[sec].forEach(item => {
          jobStatuses[j][sec][item] = {status:"",releaseDate:"",shipDate:"",notes:""};
        });
      });
    });
    statuses.forEach(r => {
      if(jobStatuses[r.job]&&jobStatuses[r.job][r.section]&&jobStatuses[r.job][r.section][r.item]) {
        jobStatuses[r.job][r.section][r.item] = {
          status: r.status||"", releaseDate: r.release_date||"",
          shipDate: r.ship_date||"", notes: r.notes||""
        };
      }
    });

    // Build jobNotes
    JOBS.forEach(j => { jobNotes[j] = ""; });
    notes.forEach(r => { jobNotes[r.job] = r.notes||""; });

    // Build alexData
    JOBS.forEach(j => {
      alexData[j] = {};
      Object.keys(SECTIONS).forEach(sec => {
        alexData[j][sec] = {};
        SECTIONS[sec].forEach(item => {
          alexData[j][sec][item] = {po:"",supplier:"",qty:"",deliveryDate:"",delivered:false,deliveryNotes:""};
        });
      });
    });
    alex.forEach(r => {
      if(alexData[r.job]&&alexData[r.job][r.section]&&alexData[r.job][r.section][r.item]) {
        alexData[r.job][r.section][r.item] = {
          po: r.po_number||"", supplier: r.supplier||"", qty: r.qty_ordered||"",
          deliveryDate: r.delivery_date||"", delivered: r.delivered||false,
          deliveryNotes: r.delivery_notes||""
        };
      }
    });

    meetings = mtgs.map(m => ({
      id: m.id, date: m.meeting_date,
      changes: m.changes||[], discussedJobs: m.discussed_jobs||[],
      actionNotes: m.action_notes||{}
    }));
  } catch(e) {
    console.error("Load error:", e);
  }
}

async function saveStatus(job, sec, item) {
  const d = jobStatuses[job][sec][item];
  try {
    await sbFetch("job_statuses", {
      method: "POST",
      prefer: "resolution=merge-duplicates,return=minimal",
      body: JSON.stringify({
        job, section: sec, item,
        status: d.status, release_date: d.releaseDate,
        ship_date: d.shipDate, notes: d.notes,
        updated_at: new Date().toISOString()
      })
    });
  } catch(e) { console.error("Save status error:", e); }
}

async function saveNote(job) {
  try {
    await sbFetch("job_notes", {
      method: "POST",
      prefer: "resolution=merge-duplicates,return=minimal",
      body: JSON.stringify({job, notes: jobNotes[job], updated_at: new Date().toISOString()})
    });
  } catch(e) { console.error("Save note error:", e); }
}

async function saveAlexItem(job, sec, item) {
  const d = alexData[job][sec][item];
  try {
    await sbFetch("alex_tracking", {
      method: "POST",
      prefer: "resolution=merge-duplicates,return=minimal",
      body: JSON.stringify({
        job, section: sec, item,
        po_number: d.po, supplier: d.supplier, qty_ordered: d.qty,
        delivery_date: d.deliveryDate, delivered: d.delivered,
        delivery_notes: d.deliveryNotes,
        updated_at: new Date().toISOString()
      })
    });
  } catch(e) { console.error("Save alex error:", e); }
}

async function saveMeetingLog(mtg) {
  try {
    await sbFetch("meeting_log", {
      method: "POST",
      prefer: "resolution=merge-duplicates,return=minimal",
      body: JSON.stringify({
        id: mtg.id, meeting_date: mtg.date,
        changes: mtg.changes, discussed_jobs: mtg.discussedJobs,
        action_notes: mtg.actionNotes
      })
    });
  } catch(e) { console.error("Save meeting error:", e); }
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function setRole(role) {
  currentRole = role;
  document.getElementById("role-claire").classList.toggle("active", role==="claire");
  document.getElementById("role-alex").classList.toggle("active", role==="alex");
}

async function tryLogin() {
  const pw = document.getElementById("pw").value;
  const valid = (currentRole==="claire" && pw===PW_CLAIRE) || (currentRole==="alex" && pw===PW_ALEX);
  if (!valid) { document.getElementById("login-err").textContent="Incorrect password."; return; }
  document.getElementById("login-err").textContent="Loading...";
  await loadAll();
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  view = "home"; render();
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split("T")[0];}
function fmtDate(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return`${m}/${d}/${y}`;}
function fmtDisplay(iso){if(!iso)return"";return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");}
function showAlert(id,msg,type){const el=document.getElementById(id);if(el){el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;}}

function render() {
  if(currentRole==="alex") renderAlexView();
  else if(view==="home") renderHome();
  else if(view==="meeting") renderMeeting();
  else if(view==="history") renderHistory();
}

// ── CLAIRE HOME ────────────────────────────────────────────────────────────────
function renderHome(){
  const recent = meetings.slice(0,6).map(m=>{
    const jc=[...new Set(m.changes.map(c=>c.job))].length;
    return`<div class="meeting-row">
      <div><div class="meeting-date">${fmtDisplay(m.date)}</div>
      <div class="meeting-meta">${jc} job${jc!==1?'s':''} updated</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn-small" onclick="view='history';render()">View</button>
        <button class="btn-danger" onclick="deleteMtg(${m.id})">Delete</button>
      </div></div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">DEME — JOB TRACKING</div>
      <div class="page-title">Weekly Meeting Log <span class="role-tag role-tag-claire">CLAIRE</span></div></div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="view='history';render()">📋 History (${meetings.length})</button>
        <button class="btn-danger" onclick="logout()">Log Out</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">START NEW MEETING WITH CHRIS</div>
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div><div class="field-label">MEETING DATE</div>
        <input type="date" id="new-date" value="${today()}" style="width:auto"/></div>
        <button class="btn-primary" onclick="startMeeting()">+ New Meeting</button>
      </div>
    </div>
    ${meetings.length>0?`<div class="card"><div class="card-label">RECENT MEETINGS</div>${recent}</div>`:`<div class="empty">No meetings yet — start one above!</div>`}`;
}

function logout(){
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("pw").value="";
  view="home";
}

function startMeeting(){
  const date=document.getElementById("new-date").value||today();
  activeMtgId=Date.now(); activeJobIdx=0; expandedSecs={}; discussed={};
  window._mtgSnapshot=JSON.parse(JSON.stringify(jobStatuses));
  window._mtgDate=date;
  view="meeting"; render();
}

async function deleteMtg(id){
  if(!confirm("Delete this meeting?"))return;
  meetings=meetings.filter(m=>m.id!==id);
  try{ await sbFetch(`meeting_log?id=eq.${id}`,{method:"DELETE",prefer:""}); }catch(e){}
  render();
}

// ── CLAIRE MEETING ─────────────────────────────────────────────────────────────
function renderMeeting(){
  const dc=Object.values(discussed).filter(Boolean).length;
  const job=JOBS[activeJobIdx];
  const pct=Math.round((dc/JOBS.length)*100);

  const sidebar=JOBS.map((j,idx)=>`
    <div class="si${idx===activeJobIdx?' active':''}" onclick="selJob(${idx})">
      <div style="display:flex;align-items:center">
        <div class="si-dot" style="background:${discussed[j]?'#10b981':'#d1d5db'}"></div>
        <span class="si-name">${j}</span>
      </div>
      ${discussed[j]?'<span style="color:#10b981;font-size:11px;font-weight:bold">✓</span>':''}
    </div>`).join("");

  const secBlocks=Object.keys(SECTIONS).map(sec=>{
    const c=SEC_COLORS[sec];
    const items=SECTIONS[sec];
    const key=`${activeJobIdx}-${sec}`;
    const isOpen=expandedSecs[key];
    const statuses=items.map(item=>jobStatuses[job][sec][item].status).filter(s=>s&&s!=="N/A"&&s!=="");
    const rel=statuses.filter(s=>s==="RELEASED").length;
    const pen=statuses.filter(s=>s==="PENDING RELEASE").length;
    const ned=statuses.filter(s=>s==="NEEDS ORDERING").length;
    let badges="";
    if(rel)badges+=`<span class="sum-badge" style="background:#d1fae5;color:#065f46">${rel} Released</span>`;
    if(pen)badges+=`<span class="sum-badge" style="background:#fef9c3;color:#854d0e">${pen} Pending</span>`;
    if(ned)badges+=`<span class="sum-badge" style="background:#fee2e2;color:#991b1b">${ned} Needs Order</span>`;

    // Also show Alex delivery info
    const alexItems=items.map(item=>{
      const a=alexData[job][sec][item];
      if(a.delivered||a.po||a.supplier) return `<span class="sum-badge" style="background:#ede9fe;color:#4c1d95">📦 ${item}: ${a.delivered?'Delivered':a.po?'PO#'+a.po:'Tracking'}</span>`;
      return '';
    }).filter(Boolean).join("");

    const itemRows=items.map(item=>{
      const d=jobStatuses[job][sec][item];
      const a=alexData[job][sec][item];
      const opts=STATUS_OPTS.map(o=>`<option value="${o}"${d.status===o?'selected':''}>${o||'— Status —'}</option>`).join("");
      const alexInfo=a.delivered?`<div style="font-size:10px;background:#d1fae5;color:#065f46;padding:3px 6px;border-radius:4px;margin-top:4px">✅ Delivered${a.deliveryDate?' '+fmtDate(a.deliveryDate):''}</div>`:a.po?`<div style="font-size:10px;background:#ede9fe;color:#4c1d95;padding:3px 6px;border-radius:4px;margin-top:4px">📦 PO#${a.po}${a.supplier?' — '+a.supplier:''}</div>`:'';
      return`<div class="item-row">
        <div class="item-name">${item}${alexInfo}</div>
        <div><select onchange="updateItem('${esc(job)}','${esc(sec)}','${esc(item)}','status',this.value)">${opts}</select></div>
        <div><div class="field-label">RELEASE DATE</div>
          <input type="date" value="${d.releaseDate}" onchange="updateItem('${esc(job)}','${esc(sec)}','${esc(item)}','releaseDate',this.value)"/></div>
        <div><div class="field-label">SHIP DATE</div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer">
              <input type="checkbox" ${d.shipDate==='ASAP'?'checked':''} onchange="setAsap('${esc(job)}','${esc(sec)}','${esc(item)}',this.checked)" style="width:auto;margin:0"/>
              <span style="font-weight:bold;color:#dc2626">ASAP</span>
            </label>
            ${d.shipDate!=='ASAP'?`<input type="date" value="${d.shipDate}" onchange="updateItem('${esc(job)}','${esc(sec)}','${esc(item)}','shipDate',this.value)"/>`:`<div style="font-size:11px;background:#fee2e2;color:#991b1b;padding:4px 8px;border-radius:4px;font-weight:bold">🚨 SHIP ASAP</div>`}
          </div>
        </div>
        <div><div class="field-label">NOTES / PO#</div>
          <input type="text" value="${esc(d.notes)}" placeholder="PO#, supplier..." onchange="updateItem('${esc(job)}','${esc(sec)}','${esc(item)}','notes',this.value)"/></div>
      </div>`;
    }).join("");

    return`<div class="sec-block">
      <div class="sec-hdr" style="background:${c.hdr}" onclick="toggleSec('${key}')">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          <span class="sec-name" style="color:#fff">${sec}</span>
          <div class="sec-summary">${badges}${alexItems}</div>
        </div>
        <span style="color:rgba(255,255,255,.8);font-size:11px">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="sec-body${isOpen?' open':''}" style="background:${c.bg}">${itemRows}</div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">MEETING WITH CHRIS — ${fmtDisplay(window._mtgDate)}</div>
      <div class="page-title">${job}</div></div>
      <div class="btn-row">
        <button class="btn-green" onclick="saveMeeting()">💾 Save Meeting Log</button>
        <button class="btn-ghost" onclick="view='home';render()">← Home</button>
      </div>
    </div>
    <div id="alert-box"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:#64748b;white-space:nowrap">${dc}/${JOBS.length} jobs</div>
    </div>
    <div class="layout">
      <div class="sidebar">${sidebar}</div>
      <div class="detail">
        <div class="job-header">
          <div class="job-title">${job}</div>
          <label style="display:flex;align-items:center;font-size:13px;color:#475569;cursor:pointer">
            <input type="checkbox" ${discussed[job]?'checked':''} onchange="setDiscussed('${esc(job)}',this.checked)" style="margin-right:6px;width:auto"/>
            Discussed this meeting
          </label>
        </div>
        <div class="action-box">
          <div class="action-box-label">📋 ACTION ITEMS / NOTES FROM CHRIS</div>
          <textarea placeholder="e.g. Send submittals, check on permit, call supplier, follow up on RFI..." onchange="updateNotes('${esc(job)}',this.value)">${esc(jobNotes[job]||"")}</textarea>
        </div>
        ${secBlocks}
        <div class="nav-row">
          <button class="${activeJobIdx>0?'btn-ghost':'btn-disabled'}" onclick="prevJob()" ${activeJobIdx===0?'disabled':''}>← Prev</button>
          <span style="font-size:12px;color:#94a3b8">${activeJobIdx+1} of ${JOBS.length}</span>
          <button class="${activeJobIdx<JOBS.length-1?'btn-primary':'btn-disabled'}" onclick="nextJob()" ${activeJobIdx===JOBS.length-1?'disabled':''}>Next →</button>
        </div>
      </div>
    </div>`;
}

function selJob(idx){activeJobIdx=idx;render();}
function prevJob(){if(activeJobIdx>0){activeJobIdx--;render();}}
function nextJob(){if(activeJobIdx<JOBS.length-1){activeJobIdx++;render();}}
function toggleSec(key){expandedSecs[key]=!expandedSecs[key];render();}
function setDiscussed(job,val){discussed[job]=val;render();}

async function updateItem(job,sec,item,field,value){
  jobStatuses[job][sec][item][field]=value;
  await saveStatus(job,sec,item);
}
async function setAsap(job,sec,item,checked){
  jobStatuses[job][sec][item].shipDate=checked?'ASAP':'';
  await saveStatus(job,sec,item);
  render();
}
async function updateNotes(job,val){
  jobNotes[job]=val;
  await saveNote(job);
}

async function saveMeeting(){
  const snap=window._mtgSnapshot||{};
  const changes=[];
  const discussedJobs=Object.keys(discussed).filter(j=>discussed[j]);
  const actionNotes={};
  discussedJobs.forEach(job=>{
    if(jobNotes[job])actionNotes[job]=jobNotes[job];
    Object.keys(SECTIONS).forEach(sec=>{
      SECTIONS[sec].forEach(item=>{
        const curr=jobStatuses[job][sec][item];
        const prev=(snap[job]&&snap[job][sec]&&snap[job][sec][item])||{};
        ["status","releaseDate","shipDate","notes"].forEach(field=>{
          if(curr[field]!==(prev[field]||"")&&curr[field]){
            changes.push({job,sec,item,field,value:curr[field]});
          }
        });
      });
    });
  });
  const mtg={id:activeMtgId,date:window._mtgDate,changes,discussedJobs,actionNotes};
  meetings.unshift(mtg);
  await saveMeetingLog(mtg);
  showAlert("alert-box",`✅ Meeting saved! ${changes.length} update${changes.length!==1?'s':''} across ${discussedJobs.length} job${discussedJobs.length!==1?'s':''}.`,"ok");
  setTimeout(()=>{view="home";render();},2000);
}

// ── CLAIRE HISTORY ─────────────────────────────────────────────────────────────
function renderHistory(){
  if(meetings.length===0){
    document.getElementById("app").innerHTML=`
      <div class="header"><div><div class="eyebrow">DEME — JOB TRACKING</div><div class="page-title">Meeting History</div></div>
      <button class="btn-ghost" onclick="view='home';render()">← Home</button></div>
      <div class="empty">No meetings logged yet.</div>`;
    return;
  }
  const entries=meetings.map(m=>{
    const byJob={};
    m.changes.forEach(c=>{if(!byJob[c.job])byJob[c.job]=[];byJob[c.job].push(c);});
    const jobHTML=Object.keys(byJob).map(job=>{
      const items=byJob[job].map(c=>{
        let label=c.field==="status"?c.value:c.field==="releaseDate"?`Release: ${fmtDate(c.value)}`:c.field==="shipDate"?`Ship: ${c.value==='ASAP'?'🚨 ASAP':fmtDate(c.value)}`:`Note: ${c.value}`;
        const st=STATUS_ST[c.value]||{};
        const badge=c.field==="status"&&st.bg?`<span class="sum-badge" style="background:${st.bg};color:${st.color}">${c.value}</span>`:`<span>${label}</span>`;
        return`<div class="hist-item">• ${c.sec} → ${c.item}: ${badge}</div>`;
      }).join("");
      const note=m.actionNotes&&m.actionNotes[job]?`<div style="margin-top:4px;padding-left:12px;font-size:11px;color:#92400e">📋 ${m.actionNotes[job]}</div>`:"";
      return`<div class="hist-job"><div class="hist-job-name">${job}</div>${items}${note}</div>`;
    }).join("");
    const jc=[...new Set(m.changes.map(c=>c.job))].length;
    return`<div class="hist-entry" id="mtg-${m.id}">
      <div class="hist-hdr"><span>${fmtDisplay(m.date)}</span><span>${jc} jobs updated</span></div>
      ${jobHTML||'<div class="hist-job" style="color:#94a3b8;font-size:12px;padding:10px 14px">No changes logged.</div>'}
    </div>`;
  }).join("");
  document.getElementById("app").innerHTML=`
    <div class="header"><div><div class="eyebrow">DEME — JOB TRACKING</div><div class="page-title">Meeting History</div></div>
    <button class="btn-ghost" onclick="view='home';render()">← Home</button></div>
    <div class="card" style="padding:12px 16px;background:#eff6ff;border-color:#bdd7ee">
      <div style="font-size:12px;color:#1e3a5f">💡 <strong>Job statuses carry forward automatically.</strong> This log shows what changed each week.</div>
    </div>${entries}`;
}

// ── ALEX VIEW ──────────────────────────────────────────────────────────────────
function renderAlexView(){
  const job=JOBS[activeJobIdx];
  const sidebar=JOBS.map((j,idx)=>{
    const allItems=Object.keys(SECTIONS).flatMap(sec=>SECTIONS[sec].map(item=>alexData[j][sec][item]));
    const deliveredCount=allItems.filter(a=>a.delivered).length;
    const totalCount=allItems.length;
    return`<div class="si${idx===activeJobIdx?' active':''}" onclick="selJob(${idx})">
      <div style="display:flex;align-items:center">
        <div class="si-dot" style="background:${deliveredCount>0?'#10b981':'#d1d5db'}"></div>
        <span class="si-name">${j}</span>
      </div>
      ${deliveredCount>0?`<span style="font-size:9px;color:#10b981;font-weight:bold">${deliveredCount}/${totalCount}</span>`:''}
    </div>`;
  }).join("");

  const secBlocks=Object.keys(SECTIONS).map(sec=>{
    const c=SEC_COLORS[sec];
    const items=SECTIONS[sec];
    const key=`alex-${activeJobIdx}-${sec}`;
    const isOpen=expandedSecs[key];
    const delivCount=items.filter(item=>alexData[job][sec][item].delivered).length;
    const badge=delivCount>0?`<span class="sum-badge" style="background:#d1fae5;color:#065f46">${delivCount}/${items.length} Delivered</span>`:'';

    const itemRows=items.map(item=>{
      const a=alexData[job][sec][item];
      const releaseInfo=jobStatuses[job][sec][item].status?`<div style="font-size:10px;margin-top:4px"><span class="sum-badge" style="background:${(STATUS_ST[jobStatuses[job][sec][item].status]||{}).bg||'#f1f5f9'};color:${(STATUS_ST[jobStatuses[job][sec][item].status]||{}).color||'#475569'}">${jobStatuses[job][sec][item].status}</span>${jobStatuses[job][sec][item].shipDate?` Ship: ${jobStatuses[job][sec][item].shipDate==='ASAP'?'🚨 ASAP':fmtDate(jobStatuses[job][sec][item].shipDate)}`:''}</div>`:'';
      return`<div class="alex-item-row">
        <div class="item-name">${item}${releaseInfo}</div>
        <div><div class="field-label">PO #</div>
          <input type="text" value="${esc(a.po)}" placeholder="PO #" onchange="updateAlex('${esc(job)}','${esc(sec)}','${esc(item)}','po',this.value)"/></div>
        <div><div class="field-label">SUPPLIER</div>
          <input type="text" value="${esc(a.supplier)}" placeholder="Supplier" onchange="updateAlex('${esc(job)}','${esc(sec)}','${esc(item)}','supplier',this.value)"/></div>
        <div><div class="field-label">QTY ORDERED</div>
          <input type="text" value="${esc(a.qty)}" placeholder="Qty" onchange="updateAlex('${esc(job)}','${esc(sec)}','${esc(item)}','qty',this.value)"/></div>
        <div><div class="field-label">DELIVERY DATE</div>
          <input type="date" value="${a.deliveryDate}" onchange="updateAlex('${esc(job)}','${esc(sec)}','${esc(item)}','deliveryDate',this.value)"/></div>
        <div><div class="field-label">DELIVERED</div>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:6px">
            <input type="checkbox" ${a.delivered?'checked':''} onchange="updateAlexBool('${esc(job)}','${esc(sec)}','${esc(item)}','delivered',this.checked)" style="width:auto;margin:0"/>
            <span style="font-size:12px;font-weight:bold;color:${a.delivered?'#065f46':'#94a3b8'}">${a.delivered?'✅ Yes':'No'}</span>
          </label></div>
        <div><div class="field-label">NOTES</div>
          <input type="text" value="${esc(a.deliveryNotes)}" placeholder="Notes..." onchange="updateAlex('${esc(job)}','${esc(sec)}','${esc(item)}','deliveryNotes',this.value)"/></div>
      </div>`;
    }).join("");

    return`<div class="sec-block">
      <div class="sec-hdr" style="background:${c.hdr}" onclick="toggleSec('${key}')">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sec-name" style="color:#fff">${sec}</span>
          ${badge}
        </div>
        <span style="color:rgba(255,255,255,.8);font-size:11px">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="sec-body${isOpen?' open':''}" style="background:${c.bg}">
        <div style="padding:8px 14px;background:rgba(0,0,0,.03);font-size:10px;font-weight:bold;color:#64748b;display:grid;grid-template-columns:130px 120px 110px 100px 130px 90px 1fr;gap:8px">
          <span>ITEM</span><span>PO #</span><span>SUPPLIER</span><span>QTY</span><span>DELIVERY DATE</span><span>DELIVERED</span><span>NOTES</span>
        </div>
        ${itemRows}
      </div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">DEME — JOB TRACKING</div>
      <div class="page-title">Material Tracking <span class="role-tag role-tag-alex">ALEX</span></div></div>
      <div class="btn-row">
        <span class="saving-indicator" id="save-ind"></span>
        <button class="btn-danger" onclick="logout()">Log Out</button>
      </div>
    </div>
    <div id="alert-box"></div>
    <div class="layout">
      <div class="sidebar">${sidebar}</div>
      <div class="detail">
        <div class="job-header">
          <div class="job-title">${job}</div>
          <span style="font-size:11px;color:#94a3b8">Updates save automatically</span>
        </div>
        ${secBlocks}
        <div class="nav-row">
          <button class="${activeJobIdx>0?'btn-ghost':'btn-disabled'}" onclick="prevJob()" ${activeJobIdx===0?'disabled':''}>← Prev</button>
          <span style="font-size:12px;color:#94a3b8">${activeJobIdx+1} of ${JOBS.length}</span>
          <button class="${activeJobIdx<JOBS.length-1?'btn-primary':'btn-disabled'}" onclick="nextJob()" ${activeJobIdx===JOBS.length-1?'disabled':''}>Next →</button>
        </div>
      </div>
    </div>`;
}

async function updateAlex(job,sec,item,field,value){
  const fieldMap={po:'po',supplier:'supplier',qty:'qty',deliveryDate:'deliveryDate',deliveryNotes:'deliveryNotes'};
  alexData[job][sec][item][fieldMap[field]||field]=value;
  const ind=document.getElementById("save-ind");
  if(ind)ind.textContent="Saving...";
  await saveAlexItem(job,sec,item);
  if(ind)ind.textContent="✅ Saved";
  setTimeout(()=>{if(ind)ind.textContent="";},2000);
}

async function updateAlexBool(job,sec,item,field,value){
  alexData[job][sec][item][field]=value;
  const ind=document.getElementById("save-ind");
  if(ind)ind.textContent="Saving...";
  await saveAlexItem(job,sec,item);
  if(ind)ind.textContent="✅ Saved";
  setTimeout(()=>{if(ind)ind.textContent="";},2000);
  render();
}
</script>
</body>
