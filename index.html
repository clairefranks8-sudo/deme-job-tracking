<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Deme - Job Tracking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f8fafc;min-height:100vh}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1e3a5f}
.login-box{background:#fff;border-radius:12px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:22px;color:#1e3a5f;margin-bottom:4px}
.login-box p{font-size:12px;color:#94a3b8;margin-bottom:20px}
.role-row{display:flex;gap:10px;margin-bottom:16px}
.role-btn{flex:1;padding:12px 8px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold;color:#475569;background:#fff}
.role-btn.active{border-color:#1e3a5f;background:#eff6ff;color:#1e3a5f}
.login-box input[type=password]{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;font-size:14px;margin-bottom:12px}
.login-box .btn-login{width:100%;background:#1e3a5f;color:#fff;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:bold;cursor:pointer}
.login-error{color:#ef4444;font-size:12px;margin-top:8px}

#app{display:none;max-width:1100px;margin:0 auto;padding:16px}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.eyebrow{font-size:10px;font-weight:bold;color:#94a3b8;letter-spacing:.1em;margin-bottom:2px}
.page-title{font-size:20px;font-weight:bold;color:#1e293b}
.role-tag{font-size:10px;font-weight:bold;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle}
.role-claire{background:#dbeafe;color:#1e40af}
.role-alex{background:#dcfce7;color:#166534}

.btn-primary{background:#1e3a5f;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-green{background:#059669;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-ghost{background:transparent;color:#475569;border:1px solid #cbd5e1;border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn-small{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}
.btn-danger{background:#fff5f5;color:#ef4444;border:1px solid #fecaca;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}
.btn-add{background:#eff6ff;color:#1e40af;border:1px dashed #93c5fd;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer;width:100%;margin-top:6px}
.btn-disabled{background:transparent;color:#cbd5e1;border:1px solid #e2e8f0;border-radius:6px;padding:7px 14px;font-size:13px;cursor:not-allowed}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-label{font-size:10px;font-weight:bold;color:#94a3b8;letter-spacing:.1em;margin-bottom:12px}
.field-label{font-size:9px;font-weight:bold;color:#94a3b8;letter-spacing:.08em;margin-bottom:4px}

input,select,textarea{border:1px solid #e2e8f0;border-radius:6px;padding:7px 9px;font-size:12px;color:#1e293b;background:#fff;width:100%;font-family:Arial,sans-serif}
textarea{resize:vertical;min-height:60px}

.layout{display:flex;gap:14px;align-items:flex-start}
.sidebar{width:200px;flex-shrink:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;max-height:85vh;overflow-y:auto}
.si{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;cursor:pointer;border-bottom:1px solid #f1f5f9}
.si:hover{background:#f8fafc}
.si.active{background:#eff6ff;border-left:3px solid #1e3a5f}
.si-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:6px}
.si-name{font-size:10px;font-weight:bold;color:#334155;line-height:1.3}

.detail{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px;max-height:85vh;overflow-y:auto;min-width:0}
.job-title{font-size:14px;font-weight:bold;color:#1e293b;margin-bottom:4px}

.action-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.action-label{font-size:10px;font-weight:bold;color:#92400e;letter-spacing:.08em;margin-bottom:6px}

/* Section block */
.sec-block{border:1px solid #e2e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;cursor:pointer;user-select:none}
.sec-title{font-size:11px;font-weight:bold;color:#fff;letter-spacing:.04em}
.sec-body{border-top:1px solid #e2e8f0;display:none}
.sec-body.open{display:block}
.sec-na{opacity:.5;pointer-events:none}

/* Item card — vertical layout, no horizontal scroll */
.item-card{border-bottom:1px solid #f1f5f9;padding:12px 14px}
.item-card:last-of-type{border-bottom:none}
.item-card:nth-child(even){background:#fafafa}
.item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.item-name-txt{font-size:12px;font-weight:bold;color:#1e293b}
.item-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.item-fields-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.item-full{grid-column:1/-1}

.sum-badge{font-size:9px;font-weight:bold;padding:2px 6px;border-radius:999px;margin-right:4px}
.delivered-yes{background:#d1fae5;color:#065f46;font-weight:bold;font-size:11px}
.delivered-no{background:#f1f5f9;color:#94a3b8;font-size:11px}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9}

.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:bold}
.alert-ok{background:#d1fae5;color:#065f46}
.alert-warn{background:#fef9c3;color:#854d0e}
.alert-err{background:#fee2e2;color:#991b1b}

.meeting-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.hist-entry{border:1px solid #e2e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden}
.hist-hdr{background:#1e3a5f;color:#fff;padding:9px 13px;font-size:12px;font-weight:bold;display:flex;justify-content:space-between}
.hist-job{padding:8px 13px;border-bottom:1px solid #f1f5f9;font-size:12px}
.hist-job:last-child{border-bottom:none}
.hist-job-name{font-weight:bold;color:#1e293b;margin-bottom:3px;font-size:11px}
.hist-item{color:#475569;font-size:11px;padding:1px 0 1px 12px}

.progress-wrap{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.progress-bar{flex:1;height:5px;background:#e2e8f0;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:#10b981;border-radius:999px;transition:width .3s}
.save-ind{font-size:11px;color:#10b981;font-weight:bold}
.empty{color:#94a3b8;font-size:14px;text-align:center;padding:40px}

@media(max-width:640px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:160px}
  .item-fields,.item-fields-3{grid-template-columns:1fr}
  .item-full{grid-column:1}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Deme - Job Tracking</h1>
    <p>Material Release & Delivery Tracker</p>
    <div class="role-row">
      <button class="role-btn active" id="rb-claire" onclick="setRole('claire')">👤 Claire<br><small>Meetings</small></button>
      <button class="role-btn" id="rb-alex" onclick="setRole('alex')">👤 Alex<br><small>Deliveries</small></button>
    </div>
    <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <button class="btn-login" onclick="tryLogin()">Enter</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<div id="app"></div>

<script>
const SURL="https://alwatlxwwznoaegvqvrw.supabase.co";
const SKEY="sb_publishable_u-mdVIHGtEEeNGcATqcWYw_A5aOyK3J";
const PW="Demestaline1";

const JOBS=[
  "CHALETS AT LAKEWOOD RANCH","COCOPLUM VILLAGE EXPANSION","FIT BUILDINGS 22 AND 23",
  "FIRELIGHT PHASE 2A","FIRELIGHT PHASE 2C","LEO SAN MARCO","LWR CORP PARK 2",
  "LWR PARCEL J","RESERVE SENIOR LIVING","SCF PARRISH 1","SRQ MALL PHASE 1",
  "SRQ MALL PHASE 1A","SRQ MALL PHASE 1B","VILLAGES OF GLEN CREEK PHASE 1C",
  "VILLAGES OF GLEN CREEK PHASE 2B","WILLOW PHASE 3"
];

const SEC_DEFAULTS={
  "STORM DRAINAGE":   ["PIPE","FITTINGS","YARD DRAINS","UNDER DRAIN"],
  "FORCE MAIN":       ["PVC","PRESSURE MATERIAL","PUNCH OUT MATERIAL","LIFT STATION MATERIAL"],
  "SANITARY SEWER":   ["PVC","FITTINGS","PUNCH OUT MATERIAL"],
  "POTABLE WATER":    ["PVC","PRESSURE MATERIAL","SERVICE BRASS","PUNCH OUT MATERIAL"],
  "FIRE":             ["PVC","PRESSURE MATERIAL","FIRE RISERS","PUNCH OUT MATERIAL"],
  "RECLAIM":          ["PVC","PRESSURE MATERIAL","SERVICE BRASS","PUNCH OUT MATERIAL"],
};
const ALL_SECS=Object.keys(SEC_DEFAULTS);

const SEC_COLORS={
  "STORM DRAINAGE":{hdr:"#2980b9",bg:"#e8f4fb"},
  "FORCE MAIN":    {hdr:"#27ae60",bg:"#eafaf1"},
  "SANITARY SEWER":{hdr:"#d4ac0d",bg:"#fefce8"},
  "POTABLE WATER": {hdr:"#2e86c1",bg:"#eaf4fb"},
  "FIRE":          {hdr:"#c0392b",bg:"#fdf2f2"},
  "RECLAIM":       {hdr:"#8e44ad",bg:"#f5eef8"},
};

const STATUS_OPTS=["","IN STOCK","RELEASED","PENDING RELEASE","NEEDS ORDERING","ON HOLD","COMPLETE","N/A"];
const STATUS_ST={
  "IN STOCK":        {bg:"#dbeafe",color:"#1e40af",dot:"#3b82f6"},
  "RELEASED":        {bg:"#d1fae5",color:"#065f46",dot:"#10b981"},
  "PENDING RELEASE": {bg:"#fef9c3",color:"#854d0e",dot:"#eab308"},
  "NEEDS ORDERING":  {bg:"#fee2e2",color:"#991b1b",dot:"#ef4444"},
  "ON HOLD":         {bg:"#f1f5f9",color:"#475569",dot:"#94a3b8"},
  "COMPLETE":        {bg:"#ede9fe",color:"#4c1d95",dot:"#8b5cf6"},
  "N/A":             {bg:"#f1f5f9",color:"#94a3b8",dot:"#e2e8f0"},
};

// State
let role="claire",view="home",activeJobIdx=0,expandedSecs={},discussed={};
let jobItems={},jobNotes={},meetings=[],activeMtgId=null;
// jobItems[job][sec] = [{id, name, status, poSupplier, deliveryDate, delivered, notes, na, custom}]

function blankItem(name,custom=false){
  return{id:Date.now()+Math.random(),name,status:"",poSupplier:"",deliveryDate:"",delivered:"no",notes:"",na:false,custom};
}

function initJob(job){
  if(!jobItems[job]){
    jobItems[job]={};
    ALL_SECS.forEach(sec=>{
      jobItems[job][sec]={na:false,items:SEC_DEFAULTS[sec].map(n=>blankItem(n))};
    });
  }
  if(!jobNotes[job])jobNotes[job]="";
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function sb(path,opts={}){
  const r=await fetch(`${SURL}/rest/v1/${path}`,{
    ...opts,
    headers:{"apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Content-Type":"application/json","Prefer":opts.prefer||"return=representation",...(opts.headers||{})}
  });
  const t=await r.text();
  return t?JSON.parse(t):[];
}

async function loadAll(){
  try{
    const[items,notes,mtgs]=await Promise.all([
      sb("job_items?select=*"),
      sb("job_notes?select=*"),
      sb("meeting_log?select=*&order=meeting_date.desc"),
    ]);

    JOBS.forEach(j=>initJob(j));

    // Override with saved items
    const byJob={};
    items.forEach(r=>{
      if(!byJob[r.job])byJob[r.job]={};
      if(!byJob[r.job][r.section])byJob[r.job][r.section]={na:false,items:[]};
      byJob[r.job][r.section].na=r.section_na||false;
      byJob[r.job][r.section].items.push({
        id:r.item_id,name:r.name,status:r.status||"",
        poSupplier:r.po_supplier||"",deliveryDate:r.delivery_date||"",
        delivered:r.delivered||"no",notes:r.notes||"",na:r.item_na||false,custom:r.custom||false
      });
    });
    Object.keys(byJob).forEach(job=>{
      if(jobItems[job])jobItems[job]=byJob[job];
    });

    notes.forEach(r=>{if(jobNotes[r.job]!==undefined)jobNotes[r.job]=r.notes||"";});

    meetings=mtgs.map(m=>({id:m.id,date:m.meeting_date,changes:m.changes||[],discussedJobs:m.discussed_jobs||[],actionNotes:m.action_notes||{}}));
  }catch(e){console.error("Load:",e);}
}

async function saveItem(job,sec,item){
  try{
    await sb("job_items",{
      method:"POST",prefer:"resolution=merge-duplicates,return=minimal",
      body:JSON.stringify({
        job,section:sec,item_id:String(item.id),name:item.name,
        status:item.status,po_supplier:item.poSupplier,delivery_date:item.deliveryDate,
        delivered:item.delivered,notes:item.notes,item_na:item.na,
        section_na:jobItems[job][sec].na,custom:item.custom,
        updated_at:new Date().toISOString()
      })
    });
  }catch(e){console.error("Save item:",e);}
}

async function saveSectionNA(job,sec){
  // update all items in section to reflect new section_na
  const secData=jobItems[job][sec];
  for(const item of secData.items){
    await saveItem(job,sec,item);
  }
}

async function saveNote(job){
  try{
    await sb("job_notes",{method:"POST",prefer:"resolution=merge-duplicates,return=minimal",
      body:JSON.stringify({job,notes:jobNotes[job],updated_at:new Date().toISOString()})});
  }catch(e){}
}

async function saveMtgLog(m){
  try{
    await sb("meeting_log",{method:"POST",prefer:"resolution=merge-duplicates,return=minimal",
      body:JSON.stringify({id:m.id,meeting_date:m.date,changes:m.changes,discussed_jobs:m.discussedJobs,action_notes:m.actionNotes})});
  }catch(e){}
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function setRole(r){
  role=r;
  document.getElementById("rb-claire").classList.toggle("active",r==="claire");
  document.getElementById("rb-alex").classList.toggle("active",r==="alex");
}

async function tryLogin(){
  if(document.getElementById("pw").value!==PW){document.getElementById("login-err").textContent="Incorrect password.";return;}
  document.getElementById("login-err").textContent="Loading...";
  // Need job_items table — create if needed via upsert approach
  await loadAll();
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  view="home";render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split("T")[0];}
function fmtDate(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return`${m}/${d}/${y}`;}
function fmtDisp(iso){if(!iso)return"";return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;");}
function showSaveInd(msg="✅ Saved"){const el=document.getElementById("save-ind");if(el){el.textContent=msg;setTimeout(()=>{if(el)el.textContent="";},2000);}}

function render(){
  if(role==="alex")renderAlex();
  else if(view==="home")renderHome();
  else if(view==="meeting")renderMeeting();
  else if(view==="history")renderHistory();
}

// ── CLAIRE HOME ───────────────────────────────────────────────────────────────
function renderHome(){
  const rows=meetings.slice(0,6).map(m=>{
    const jc=[...new Set(m.changes.map(c=>c.job))].length;
    return`<div class="meeting-row">
      <div><div style="font-size:14px;font-weight:bold;color:#1e293b">${fmtDisp(m.date)}</div>
      <div style="font-size:12px;color:#64748b">${jc} job${jc!==1?'s':''} updated</div></div>
      <div class="btn-row">
        <button class="btn-small" onclick="view='history';render()">View</button>
        <button class="btn-danger" onclick="delMtg(${m.id})">Delete</button>
      </div></div>`;
  }).join("");
  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">DEME — JOB TRACKING</div>
      <div class="page-title">Weekly Meeting Log <span class="role-tag role-claire">CLAIRE</span></div></div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="view='history';render()">📋 History (${meetings.length})</button>
        <button class="btn-ghost" onclick="logout()">Log Out</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">START NEW MEETING WITH CHRIS</div>
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div><div class="field-label">MEETING DATE</div>
        <input type="date" id="new-date" value="${today()}" style="width:auto"/></div>
        <button class="btn-primary" onclick="startMtg()">+ New Meeting</button>
      </div>
    </div>
    ${meetings.length>0?`<div class="card"><div class="card-label">RECENT MEETINGS</div>${rows}</div>`:`<div class="empty">No meetings yet — start one above!</div>`}`;
}

function logout(){document.getElementById("app").style.display="none";document.getElementById("login-screen").style.display="flex";document.getElementById("pw").value="";}

function startMtg(){
  const date=document.getElementById("new-date").value||today();
  activeMtgId=Date.now();activeJobIdx=0;expandedSecs={};discussed={};
  window._snap=JSON.parse(JSON.stringify(jobItems));
  window._mtgDate=date;
  view="meeting";render();
}

async function delMtg(id){
  if(!confirm("Delete this meeting?"))return;
  meetings=meetings.filter(m=>m.id!==id);
  try{await sb(`meeting_log?id=eq.${id}`,{method:"DELETE",prefer:""});}catch(e){}
  render();
}

// ── CLAIRE MEETING ────────────────────────────────────────────────────────────
function renderMeeting(){
  const job=JOBS[activeJobIdx];
  initJob(job);
  const dc=Object.values(discussed).filter(Boolean).length;
  const pct=Math.round((dc/JOBS.length)*100);

  const sidebar=JOBS.map((j,i)=>`
    <div class="si${i===activeJobIdx?' active':''}" onclick="selJob(${i})">
      <div style="display:flex;align-items:center;min-width:0">
        <div class="si-dot" style="background:${discussed[j]?'#10b981':'#d1d5db'}"></div>
        <span class="si-name">${j}</span>
      </div>
      ${discussed[j]?'<span style="color:#10b981;font-size:10px;flex-shrink:0">✓</span>':''}
    </div>`).join("");

  const secs=ALL_SECS.map(sec=>{
    const sd=jobItems[job][sec];
    const c=SEC_COLORS[sec];
    const key=`${activeJobIdx}-${sec}`;
    const open=expandedSecs[key];
    const relCount=sd.items.filter(it=>!it.na&&it.status==="RELEASED").length;
    const badges=relCount?`<span class="sum-badge" style="background:#d1fae5;color:#065f46">${relCount} Released</span>`:"";

    const itemCards=sd.items.map((it,ii)=>{
      const st=STATUS_ST[it.status]||{};
      const statusBadge=it.status?`<span class="sum-badge" style="background:${st.bg};color:${st.color}">${it.status}</span>`:"";
      const opts=STATUS_OPTS.map(o=>`<option value="${o}"${it.status===o?'selected':''}>${o||'— Status —'}</option>`).join("");
      return`<div class="item-card" style="${it.na?'opacity:.45':''}">
        <div class="item-top">
          <span class="item-name-txt">${esc(it.name)} ${statusBadge}</span>
          <div class="btn-row">
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:#94a3b8">
              <input type="checkbox" ${it.na?'checked':''} onchange="toggleItemNA('${esc(job)}','${esc(sec)}',${ii},this.checked)" style="width:auto;margin:0"/>N/A
            </label>
            ${it.custom?`<button class="btn-danger" onclick="deleteItem('${esc(job)}','${esc(sec)}',${ii})">✕</button>`:''}
          </div>
        </div>
        <div class="item-fields">
          <div><div class="field-label">STATUS</div>
            <select onchange="updItem('${esc(job)}','${esc(sec)}',${ii},'status',this.value)">${opts}</select></div>
          <div><div class="field-label">RELEASE DATE</div>
            <input type="date" value="${it.releaseDate||''}" onchange="updItem('${esc(job)}','${esc(sec)}',${ii},'releaseDate',this.value)"/></div>
          <div><div class="field-label">SHIP DATE</div>
            <div style="display:flex;flex-direction:column;gap:3px">
              <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer">
                <input type="checkbox" ${it.shipDate==='ASAP'?'checked':''} onchange="setAsap('${esc(job)}','${esc(sec)}',${ii},this.checked)" style="width:auto;margin:0"/>
                <span style="font-weight:bold;color:#dc2626">ASAP</span>
              </label>
              ${it.shipDate!=='ASAP'?`<input type="date" value="${it.shipDate||''}" onchange="updItem('${esc(job)}','${esc(sec)}',${ii},'shipDate',this.value)"/>`:`<div style="font-size:11px;background:#fee2e2;color:#991b1b;padding:4px 8px;border-radius:4px;font-weight:bold">🚨 SHIP ASAP</div>`}
            </div></div>
          <div class="item-full"><div class="field-label">NOTES</div>
            <textarea rows="2" onchange="updItem('${esc(job)}','${esc(sec)}',${ii},'notes',this.value)">${esc(it.notes)}</textarea></div>
        </div>
      </div>`;
    }).join("");

    return`<div class="sec-block">
      <div class="sec-hdr" style="background:${c.hdr}" onclick="toggleSec('${key}')">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="sec-title">${sec}</span>${badges}
          ${sd.na?'<span class="sum-badge" style="background:rgba(255,255,255,.2);color:#fff">N/A</span>':''}
        </div>
        <div style="display:flex;align-items:center;gap:8px" onclick="event.stopPropagation()">
          <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.8);cursor:pointer">
            <input type="checkbox" ${sd.na?'checked':''} onchange="toggleSecNA('${esc(job)}','${esc(sec)}',this.checked)" style="width:auto;margin:0"/>
            Whole section N/A
          </label>
          <span style="color:rgba(255,255,255,.7);font-size:11px">${open?'▲':'▼'}</span>
        </div>
      </div>
      <div class="sec-body${open?' open':''}" style="background:${c.bg}">
        ${itemCards}
        <div style="padding:8px 14px">
          <button class="btn-add" onclick="addItem('${esc(job)}','${esc(sec)}')">+ Add Item</button>
        </div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">MEETING — ${fmtDisp(window._mtgDate)}</div>
      <div class="page-title" style="font-size:16px">${job}</div></div>
      <div class="btn-row">
        <button class="btn-green" onclick="saveMeeting()">💾 Save</button>
        <button class="btn-ghost" onclick="view='home';render()">← Home</button>
      </div>
    </div>
    <div id="alert-box"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span style="font-size:11px;color:#64748b;white-space:nowrap">${dc}/${JOBS.length}</span>
    </div>
    <div class="layout">
      <div class="sidebar">${sidebar}</div>
      <div class="detail">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
          <div class="job-title">${job}</div>
          <label style="display:flex;align-items:center;font-size:12px;color:#475569;cursor:pointer;gap:6px">
            <input type="checkbox" ${discussed[job]?'checked':''} onchange="setDisc('${esc(job)}',this.checked)" style="width:auto;margin:0"/>
            Discussed this meeting
          </label>
        </div>
        <div class="action-box">
          <div class="action-label">📋 ACTION ITEMS / NOTES FROM CHRIS</div>
          <textarea placeholder="Send submittals, check permit, call supplier, RFI..." onchange="updNotes('${esc(job)}',this.value)">${esc(jobNotes[job]||"")}</textarea>
        </div>
        ${secs}
        <div class="nav-row">
          <button class="${activeJobIdx>0?'btn-ghost':'btn-disabled'}" onclick="prevJob()" ${activeJobIdx===0?'disabled':''}>← Prev</button>
          <span style="font-size:11px;color:#94a3b8">${activeJobIdx+1} / ${JOBS.length}</span>
          <button class="${activeJobIdx<JOBS.length-1?'btn-primary':'btn-disabled'}" onclick="nextJob()" ${activeJobIdx===JOBS.length-1?'disabled':''}>Next →</button>
        </div>
      </div>
    </div>`;
}

function selJob(i){activeJobIdx=i;render();}
function prevJob(){if(activeJobIdx>0){activeJobIdx--;render();}}
function nextJob(){if(activeJobIdx<JOBS.length-1){activeJobIdx++;render();}}
function toggleSec(k){expandedSecs[k]=!expandedSecs[k];render();}
function setDisc(job,v){discussed[job]=v;render();}

async function updItem(job,sec,ii,field,val){
  jobItems[job][sec].items[ii][field]=val;
  await saveItem(job,sec,jobItems[job][sec].items[ii]);
}

async function setAsap(job,sec,ii,checked){
  jobItems[job][sec].items[ii].shipDate=checked?'ASAP':'';
  await saveItem(job,sec,jobItems[job][sec].items[ii]);
  render();
}

async function toggleItemNA(job,sec,ii,val){
  jobItems[job][sec].items[ii].na=val;
  await saveItem(job,sec,jobItems[job][sec].items[ii]);
  render();
}

async function toggleSecNA(job,sec,val){
  jobItems[job][sec].na=val;
  await saveSectionNA(job,sec);
  render();
}

async function addItem(job,sec){
  const name=prompt("Item name:");
  if(!name||!name.trim())return;
  const item=blankItem(name.trim(),true);
  jobItems[job][sec].items.push(item);
  await saveItem(job,sec,item);
  render();
}

async function deleteItem(job,sec,ii){
  if(!confirm("Delete this item?"))return;
  const item=jobItems[job][sec].items[ii];
  jobItems[job][sec].items.splice(ii,1);
  try{await sb(`job_items?item_id=eq.${item.id}`,{method:"DELETE",prefer:""});}catch(e){}
  render();
}

async function updNotes(job,val){jobNotes[job]=val;await saveNote(job);}

async function saveMeeting(){
  const snap=window._snap||{};
  const changes=[];
  const discJobs=Object.keys(discussed).filter(j=>discussed[j]);
  const actionNotes={};
  discJobs.forEach(job=>{
    if(jobNotes[job])actionNotes[job]=jobNotes[job];
    ALL_SECS.forEach(sec=>{
      const curr=jobItems[job]?.[sec]?.items||[];
      const prev=snap[job]?.[sec]?.items||[];
      curr.forEach(item=>{
        const old=prev.find(p=>p.id===item.id)||{};
        ["status","shipDate","poSupplier","deliveryDate","delivered"].forEach(f=>{
          if(item[f]!==(old[f]||"")&&item[f]){
            changes.push({job,sec,item:item.name,field:f,value:item[f]});
          }
        });
      });
    });
  });
  const m={id:activeMtgId,date:window._mtgDate,changes,discussedJobs:discJobs,actionNotes};
  meetings.unshift(m);
  await saveMtgLog(m);
  document.getElementById("alert-box").innerHTML=`<div class="alert alert-ok">✅ Meeting saved! ${changes.length} update${changes.length!==1?'s':''} across ${discJobs.length} job${discJobs.length!==1?'s':''}.</div>`;
  setTimeout(()=>{view="home";render();},2000);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const entries=meetings.map(m=>{
    const byJob={};
    m.changes.forEach(c=>{if(!byJob[c.job])byJob[c.job]=[];byJob[c.job].push(c);});
    const jHTML=Object.keys(byJob).map(job=>{
      const its=byJob[job].map(c=>{
        const label=c.field==="status"?c.value:c.field==="shipDate"?`Ship: ${c.value==='ASAP'?'🚨 ASAP':fmtDate(c.value)}`:c.field==="delivered"?`Delivered: ${c.value}`:`${c.field}: ${c.value}`;
        const st=STATUS_ST[c.value]||{};
        const b=c.field==="status"&&st.bg?`<span class="sum-badge" style="background:${st.bg};color:${st.color}">${c.value}</span>`:`<span>${label}</span>`;
        return`<div class="hist-item">• ${c.sec} → ${c.item}: ${b}</div>`;
      }).join("");
      const note=m.actionNotes?.[job]?`<div style="margin-top:3px;padding-left:12px;font-size:11px;color:#92400e">📋 ${m.actionNotes[job]}</div>`:"";
      return`<div class="hist-job"><div class="hist-job-name">${job}</div>${its}${note}</div>`;
    }).join("");
    return`<div class="hist-entry">
      <div class="hist-hdr"><span>${fmtDisp(m.date)}</span><span>${[...new Set(m.changes.map(c=>c.job))].length} jobs</span></div>
      ${jHTML||'<div class="hist-job" style="color:#94a3b8;padding:10px 13px;font-size:12px">No changes logged.</div>'}
    </div>`;
  }).join("");
  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">DEME — JOB TRACKING</div><div class="page-title">Meeting History</div></div>
      <button class="btn-ghost" onclick="view='home';render()">← Home</button>
    </div>
    ${meetings.length?entries:`<div class="empty">No meetings logged yet.</div>`}`;
}

// ── ALEX VIEW ─────────────────────────────────────────────────────────────────
function renderAlex(){
  const job=JOBS[activeJobIdx];
  initJob(job);

  const sidebar=JOBS.map((j,i)=>{
    const allItems=ALL_SECS.flatMap(s=>(jobItems[j]?.[s]?.items||[]));
    const deliv=allItems.filter(it=>it.delivered==="yes").length;
    return`<div class="si${i===activeJobIdx?' active':''}" onclick="selJob(${i})">
      <div style="display:flex;align-items:center;min-width:0">
        <div class="si-dot" style="background:${deliv>0?'#10b981':'#d1d5db'}"></div>
        <span class="si-name">${j}</span>
      </div>
      ${deliv>0?`<span style="font-size:9px;color:#10b981;font-weight:bold;flex-shrink:0">${deliv}✓</span>`:''}
    </div>`;
  }).join("");

  const secs=ALL_SECS.map(sec=>{
    const sd=jobItems[job][sec];
    const c=SEC_COLORS[sec];
    const key=`alex-${activeJobIdx}-${sec}`;
    const open=expandedSecs[key];
    const delivCount=sd.items.filter(it=>it.delivered==="yes").length;
    const badge=delivCount?`<span class="sum-badge" style="background:#d1fae5;color:#065f46">${delivCount}/${sd.items.length} Delivered</span>`:"";

    const itemCards=sd.items.map((it,ii)=>{
      const relInfo=it.status?`<span class="sum-badge" style="background:${(STATUS_ST[it.status]||{}).bg||'#f1f5f9'};color:${(STATUS_ST[it.status]||{}).color||'#475569'}">${it.status}</span>`:"";
      const shipInfo=it.shipDate?`<span style="font-size:10px;color:#64748b;margin-left:4px">${it.shipDate==='ASAP'?'🚨 ASAP':'Ship: '+fmtDate(it.shipDate)}</span>`:"";
      return`<div class="item-card">
        <div class="item-top">
          <span class="item-name-txt">${esc(it.name)} ${relInfo}${shipInfo}</span>
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:#94a3b8">
            <input type="checkbox" ${it.na?'checked':''} onchange="alexToggleNA('${esc(job)}','${esc(sec)}',${ii},this.checked)" style="width:auto;margin:0"/>N/A
          </label>
        </div>
        <div class="item-fields">
          <div><div class="field-label">PO # / SUPPLIER</div>
            <input type="text" value="${esc(it.poSupplier)}" placeholder="PO# / Supplier name" onchange="alexUpd('${esc(job)}','${esc(sec)}',${ii},'poSupplier',this.value)"/></div>
          <div><div class="field-label">DELIVERED</div>
            <select onchange="alexUpd('${esc(job)}','${esc(sec)}',${ii},'delivered',this.value)">
              <option value="no"${it.delivered==='no'?'selected':''}>No</option>
              <option value="yes"${it.delivered==='yes'?'selected':''}>✅ Yes</option>
              <option value="partial"${it.delivered==='partial'?'selected':''}>Partial</option>
            </select></div>
          <div><div class="field-label">DELIVERY DATE</div>
            <input type="date" value="${it.deliveryDate||''}" onchange="alexUpd('${esc(job)}','${esc(sec)}',${ii},'deliveryDate',this.value)"/></div>
          <div class="item-full"><div class="field-label">NOTES</div>
            <textarea rows="2" placeholder="Delivery notes, short items, back order info..." onchange="alexUpd('${esc(job)}','${esc(sec)}',${ii},'notes',this.value)">${esc(it.notes)}</textarea></div>
        </div>
      </div>`;
    }).join("");

    return`<div class="sec-block">
      <div class="sec-hdr" style="background:${c.hdr}" onclick="toggleSec('${key}')">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sec-title">${sec}</span>${badge}
          ${sd.na?'<span class="sum-badge" style="background:rgba(255,255,255,.2);color:#fff">N/A</span>':''}
        </div>
        <span style="color:rgba(255,255,255,.7);font-size:11px">${open?'▲':'▼'}</span>
      </div>
      <div class="sec-body${open?' open':''}" style="background:${c.bg}">
        ${itemCards}
        <div style="padding:8px 14px">
          <button class="btn-add" onclick="alexAddItem('${esc(job)}','${esc(sec)}')">+ Add Item</button>
        </div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div><div class="eyebrow">DEME — JOB TRACKING</div>
      <div class="page-title">Material Tracking <span class="role-tag role-alex">ALEX</span></div></div>
      <div class="btn-row">
        <span class="save-ind" id="save-ind"></span>
        <button class="btn-ghost" onclick="logout()">Log Out</button>
      </div>
    </div>
    <div class="layout">
      <div class="sidebar">${sidebar}</div>
      <div class="detail">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="job-title">${job}</div>
          <span style="font-size:11px;color:#94a3b8">Auto-saves</span>
        </div>
        ${secs}
        <div class="nav-row">
          <button class="${activeJobIdx>0?'btn-ghost':'btn-disabled'}" onclick="prevJob()" ${activeJobIdx===0?'disabled':''}>← Prev</button>
          <span style="font-size:11px;color:#94a3b8">${activeJobIdx+1} / ${JOBS.length}</span>
          <button class="${activeJobIdx<JOBS.length-1?'btn-primary':'btn-disabled'}" onclick="nextJob()" ${activeJobIdx===JOBS.length-1?'disabled':''}>Next →</button>
        </div>
      </div>
    </div>`;
}

async function alexUpd(job,sec,ii,field,val){
  jobItems[job][sec].items[ii][field]=val;
  const ind=document.getElementById("save-ind");if(ind)ind.textContent="Saving...";
  await saveItem(job,sec,jobItems[job][sec].items[ii]);
  showSaveInd();
  if(field==="delivered")render();
}

async function alexToggleNA(job,sec,ii,val){
  jobItems[job][sec].items[ii].na=val;
  await saveItem(job,sec,jobItems[job][sec].items[ii]);
  render();
}

async function alexAddItem(job,sec){
  const name=prompt("Item name:");
  if(!name||!name.trim())return;
  const item=blankItem(name.trim(),true);
  jobItems[job][sec].items.push(item);
  await saveItem(job,sec,item);
  render();
}
</script>
</body>
